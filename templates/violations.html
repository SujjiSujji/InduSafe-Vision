<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InduSafe Sentinel - All Violations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #1a237e, #3949ab); }
        .violation-card { transition: transform 0.2s; }
        .violation-card:hover { transform: translateY(-2px); }
        .status-open { background: #ffebee; color: #d32f2f; padding: 4px 12px; border-radius: 4px; }
        .status-acknowledged { background: #e8f5e9; color: #388e3c; padding: 4px 12px; border-radius: 4px; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-shield-check"></i> InduSafe Sentinel</a>
            <div class="text-white">
                <span class="badge bg-success">● System Online</span>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 bg-white vh-100 p-0">
                <div class="nav flex-column">
                    <a class="nav-link py-3" href="/">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                    <a class="nav-link py-3" href="/workers">
                        <i class="bi bi-people me-2"></i>Workers
                    </a>
                    <a class="nav-link active bg-light text-primary border-end border-primary border-3 py-3" href="/violations">
                        <i class="bi bi-exclamation-triangle me-2"></i>All Violations
                    </a>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h2 class="mb-4">All Violations</h2>

                <!-- Stats -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card bg-danger text-white">
                            <div class="card-body">
                                <h5>Total Violations</h5>
                                <h2 id="total-count">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-warning text-white">
                            <div class="card-body">
                                <h5>Open</h5>
                                <h2 id="open-count">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-success text-white">
                            <div class="card-body">
                                <h5>Acknowledged</h5>
                                <h2 id="ack-count">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-info text-white">
                            <div class="card-body">
                                <h5>Today's</h5>
                                <h2 id="today-count">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Violations Grid -->
                <div id="violations-grid" class="row">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2 text-muted">Loading violations...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadViolations() {
            try {
                const [violationsRes, statsRes] = await Promise.all([
                    fetch('/api/violations?limit=100'),
                    fetch('/api/stats')
                ]);

                const violations = await violationsRes.json();
                const stats = await statsRes.json();

                // Update stats
                document.getElementById('total-count').textContent = stats.total;
                document.getElementById('open-count').textContent = stats.open;
                document.getElementById('ack-count').textContent = stats.total - stats.open;
                document.getElementById('today-count').textContent = stats.today;

                displayViolations(violations);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('violations-grid').innerHTML = 
                    '<div class="col-12 text-center text-danger">Error loading violations</div>';
            }
        }

        function displayViolations(violations) {
            const grid = document.getElementById('violations-grid');

            if (violations.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center text-muted py-5">No violations recorded yet</div>';
                return;
            }

            grid.innerHTML = violations.map(v => `
                <div class="col-md-4 mb-4">
                    <div class="card violation-card h-100">
                        ${v.image_path ? `
                            <img src="/static/uploads/${v.image_path}" class="card-img-top" alt="Evidence" style="height: 200px; object-fit: cover;">
                        ` : '<div class="bg-light text-center py-5 text-muted">No Image</div>'}
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0">${v.worker_name || 'Unknown'}</h5>
                                <span class="status-${v.status.toLowerCase()}">${v.status}</span>
                            </div>
                            <p class="card-text">
                                <span class="badge bg-danger">${v.violation_type.replace(/_/g, ' ').toUpperCase()}</span>
                            </p>
                            <p class="card-text text-muted">
                                <small><i class="bi bi-geo-alt"></i> ${v.zone}</small><br>
                                <small><i class="bi bi-clock"></i> ${new Date(v.timestamp).toLocaleString()}</small>
                            </p>
                        </div>
                        <div class="card-footer bg-transparent">
                            ${v.status === 'Open' ? `
                                <button class="btn btn-success btn-sm w-100" onclick="acknowledge(${v.id})">
                                    <i class="bi bi-check"></i> Acknowledge
                                </button>
                            ` : '<span class="text-success"><i class="bi bi-check-circle"></i> Acknowledged</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function acknowledge(id) {
            try {
                await fetch(`/api/violations/${id}/acknowledge`, { method: 'POST' });
                loadViolations();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        loadViolations();
        setInterval(loadViolations, 5000);
    </script>
</body>
</html>
